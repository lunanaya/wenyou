<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Tavern Weaver</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #fdfbf7; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn { padding: 5px 10px; cursor: pointer; background: #eee; border: none; }
        .tab-btn.active { background: #d97706; color: white; }
        .content { display: none; }
        .content.active { display: block; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('story')">生成</button>
        <button class="tab-btn" onclick="showTab('world')">世界书</button>
        <button class="tab-btn" onclick="showTab('settings')">设置</button>
    </div>
    <div id="story" class="content active"><h3>生成面板</h3><textarea style="width:100%; height:200px;"></textarea></div>
    <div id="world" class="content"><h3>世界书设置</h3><p>这里是世界书配置...</p></div>
    <div id="settings" class="content"><h3>系统设置</h3><p>这里是系统配置...</p></div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
